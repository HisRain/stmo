<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048小游戏 | 海口实验中学科技社</title>
    <link rel="stylesheet" href="../../../styles/main.css">
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <style>
        .game-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .game-modal {
            background: var(--surface-container-high);
            padding: 24px;
            border-radius: 16px;
            color: var(--on-surface);
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="container main-layout">
        <article class="article-detail">
            <div class="article-header">
                <h1 class="article-title">2048</h1>
                <span class="category-tag">2048</span>
            </div>

            <div class="article-content">

                <p>玩法：使用 <strong>方向键</strong> 移动方块。当两个数字相同的方块接触时，它们会合并相加为数值更大的方块！</p>
                <p>请注意：只需达到 128 分即可获得盖章奖励。</p>
                
                <div class="game-wrapper">
                    <div class="heading">
                        <h1 class="title">2048</h1>
                        <div class="scores-container">
                            <div class="score-container" id="scoreContainer">0</div>
                            <div class="best-container">0</div>
                        </div>
                    </div>

                    <div class="game-container">
                        <div class="game-message">
                            <p></p>
                            <div class="lower">
                                <a class="keep-playing-button">继续游戏</a>
                                <a class="retry-button">重试</a>
                            </div>
                        </div>

                        <div class="grid-container">
                            <div class="grid-row">
                                <div class="grid-cell"></div>
                                <div class="grid-cell"></div>
                                <div class="grid-cell"></div>
                                <div class="grid-cell"></div>
                            </div>
                            <div class="grid-row">
                                <div class="grid-cell"></div>
                                <div class="grid-cell"></div>
                                <div class="grid-cell"></div>
                                <div class="grid-cell"></div>
                            </div>
                            <div class="grid-row">
                                <div class="grid-cell"></div>
                                <div class="grid-cell"></div>
                                <div class="grid-cell"></div>
                                <div class="grid-cell"></div>
                            </div>
                            <div class="grid-row">
                                <div class="grid-cell"></div>
                                <div class="grid-cell"></div>
                                <div class="grid-cell"></div>
                                <div class="grid-cell"></div>
                            </div>
                        </div>
                        <div class="tile-container"></div>
                    </div>
                </div>
            </div>

            <div class="game-overlay" id="overlay1">
                <div class="game-modal">
                    <h2 style="font-weight: bold; color: var(--primary);">任 务 完 成 ！</h2>
                    <p>太棒了，你达到了 128 分！<br>请凭此界面寻找工作人员盖章</p>
                    <img src="/images/photo/wqx2077.jpg" width="200" style="margin: 15px 0; border-radius: 8px;">
                    <br>
                    <button class="hero-cta" onclick="location.reload();">重新挑战</button>
                </div>
            </div>
            <!--
            <div class="article-actions">
                <button class="action-button"><span class="material-symbols-rounded">thumb_up</span><span>点赞</span></button>
                <button class="action-button"><span class="material-symbols-rounded">share</span><span>分享</span></button>
            </div>
          -->
        </article>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/bind_polyfill.js"></script>
    <script src="js/classlist_polyfill.js"></script>
    <script src="js/animframe_polyfill.js"></script>
    <script src="js/keyboard_input_manager.js"></script>
    <script src="js/html_actuator.js"></script>
    <script src="js/grid.js"></script>
    <script src="js/tile.js"></script>
    <script src="js/local_storage_manager.js"></script>
    <script src="js/game_manager.js"></script>
    <script src="js/application.js"></script>

    <script>
      const scoreContainer = document.getElementById('scoreContainer');
      function checkScore() {
        const score = parseInt(scoreContainer.innerText.trim());
        if (!isNaN(score) && score >= 128) {
          localStorage.clear();
          document.getElementById('overlay1').style.display = 'flex';
        }
      }
      document.addEventListener('keydown', () => setTimeout(checkScore, 100));
      document.addEventListener('click', () => setTimeout(checkScore, 100));
    </script>
    <script src="../../../scripts/main.js"></script>
</body>
</html>
